<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>2/5 — Midnight Ward</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090B;
    --surface: #18181B;
    --surface-raised: #27272A;
    --text: #FAFAFA;
    --text-secondary: #A1A1AA;
    --accent: #3B82F6;
    --accent-soft: rgba(59,130,246,0.12);
    --border: #27272A;
    --weekend-bg: rgba(251,146,60,0.08);
    --weekend-text: #FB923C;
    --danger: #EF4444;
    --success: #22C55E;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    padding-bottom: 90px;
  }

  header {
    background: rgba(9,9,11,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    width: 32px; height: 32px; background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 14px;
  }
  .month-nav { display: flex; align-items: center; gap: 8px; }
  .month-nav button {
    width: 36px; height: 36px; border: none; background: none; cursor: pointer;
    border-radius: 8px; font-size: 18px; color: var(--text-secondary);
  }
  .month-title { text-align: center; }
  .month-title h2 { font-size: 17px; font-weight: 600; }
  .month-title span { font-size: 12px; color: var(--text-secondary); }

  .actions { padding: 12px 16px; display: flex; gap: 8px; }
  .btn-generate {
    flex: 1; padding: 14px; border: none; border-radius: var(--radius);
    background: var(--accent); color: white; font-weight: 600; font-size: 14px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-export {
    width: 48px; height: 48px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--surface); cursor: pointer; color: var(--text-secondary); font-size: 16px;
    display: flex; align-items: center; justify-content: center;
  }

  .calendar { margin: 0 16px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-header span {
    text-align: center; padding: 10px 0; font-size: 11px; font-weight: 600;
    color: var(--text-secondary); letter-spacing: 0.5px;
  }
  .cal-header span:nth-child(6), .cal-header span:nth-child(7) { color: var(--weekend-text); }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); }
  .cal-cell {
    background: var(--surface); aspect-ratio: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px; padding: 2px;
    min-height: 52px;
  }
  .cal-cell.weekend { background: var(--weekend-bg); }
  .cal-cell.empty { background: var(--bg); }
  .cal-cell .day { font-size: 12px; font-weight: 600; color: var(--text); }
  .cal-cell.weekend .day { color: var(--weekend-text); }
  .cal-cell .doc {
    font-size: 8px; font-weight: 600; padding: 2px 6px;
    border-radius: 6px; max-width: 95%; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Floating pill nav */
  nav {
    position: fixed; bottom: 12px; left: 16px; right: 16px; z-index: 40;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 4px;
    display: flex;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  nav button {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 6px 0; border: none; background: none; cursor: pointer;
    font-size: 9px; font-weight: 500; color: var(--text-secondary);
    transition: color 0.2s;
  }
  nav button.active { color: var(--accent); }
  nav button svg { width: 20px; height: 20px; }

  .badge {
    font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px;
    display: inline-block; letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Ε</div>
  <div class="month-nav">
    <button>‹</button>
    <div class="month-title">
      <h2>Μάρτιος</h2>
      <span>2026</span>
    </div>
    <button>›</button>
  </div>
  <div style="width:32px"></div>
</header>

<div class="actions">
  <button class="btn-generate">Δημιουργία Προγράμματος</button>
  <button class="btn-export">⤓</button>
</div>

<div class="calendar">
  <div class="cal-header">
    <span>Δε</span><span>Τρ</span><span>Τε</span><span>Πε</span><span>Πα</span><span>Σα</span><span>Κυ</span>
  </div>
  <div class="cal-grid" id="grid"></div>
</div>

<nav>
  <button class="active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Ημερολόγιο
  </button>
  <button>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    Λίστα
  </button>
  <button>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Στατιστικά
  </button>
  <button>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
    Επιθυμίες
  </button>
  <button>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Ρυθμίσεις
  </button>
</nav>

<script>
const doctors = [
  { name: 'Μάρκου', color: '#3B82F6', bg: 'rgba(59,130,246,0.15)' },
  { name: 'Μαυρογ', color: '#22C55E', bg: 'rgba(34,197,94,0.15)' },
  { name: 'Λαμπαδ', color: '#A78BFA', bg: 'rgba(167,139,250,0.15)' },
  { name: 'Κάντα', color: '#EF4444', bg: 'rgba(239,68,68,0.15)' },
  { name: 'Κοντογ', color: '#FB923C', bg: 'rgba(251,146,60,0.15)' },
];
const schedule = [null,0,1,2,3,1,4,3,0,1,4,1,3,4,0,3,1,2,4,1,4,0,4,3,2,1,0,4,3,0,4];
const grid = document.getElementById('grid');
for (let i = 0; i < 6; i++) {
  const c = document.createElement('div');
  c.className = 'cal-cell empty';
  grid.appendChild(c);
}
for (let d = 1; d <= 31; d++) {
  const dow = new Date(2026, 2, d).getDay();
  const isWknd = dow === 0 || dow === 6;
  const c = document.createElement('div');
  c.className = 'cal-cell' + (isWknd ? ' weekend' : '');
  const docIdx = schedule[d-1];
  let html = `<span class="day">${d}</span>`;
  if (docIdx !== null) {
    const doc = doctors[docIdx];
    html += `<span class="badge" style="background:${doc.bg};color:${doc.color}">${doc.name}</span>`;
  }
  c.innerHTML = html;
  grid.appendChild(c);
}
</script>
</body>
</html>
